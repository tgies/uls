name: Mutants (PR)

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

on:
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".cargo/mutants.toml"
      - ".github/workflows/mutants-pr.yml"

jobs:
  incremental-mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # Need history to diff against base
          persist-credentials: false
      - name: Compute diff vs base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff origin/"$BASE_REF"...HEAD | tee git.diff
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@e0eafa9a0d485c37f97c0f7beb930a58a2facbac # v2.79.4
        with:
          tool: cargo-mutants,nextest
      - name: Run cargo-mutants on diff
        continue-on-error: true
        run: cargo mutants --workspace --no-shuffle -vV --test-tool nextest --in-diff git.diff
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-incremental.out
          path: mutants.out
